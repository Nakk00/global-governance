            - generic [ref=e137]:
              - paragraph [ref=e138]: Summary
              - paragraph [ref=e139]: International law and institutions can narrow what states can credibly claim, justify, or ignore, but enforcement often depends on consent, coalitions, leverage, and political will.
            - paragraph [ref=e140]: The limit is not that rules are meaningless; the limit is that rules need actors to interpret, defend, and apply them.
          - generic [ref=e141]:
            - paragraph [ref=e142]: Supporting detail
            - paragraph [ref=e143]: States may comply because they value stability, need cooperation in other areas, want legitimacy, or fear costs from partners and publics.
            - paragraph [ref=e144]: They may resist when a rule threatens security interests, domestic political narratives, economic gains, or territorial claims.
          - generic [ref=e146]:
